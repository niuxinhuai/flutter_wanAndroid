allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

subprojects { subproject ->
    subproject.plugins.withId("com.android.library") {
        def legacyNamespaces = [
                amap_flutter_map: "com.amap.flutter.amap_flutter_map",
                flutter_boost  : "com.idlefish.flutterboost",
        ]
        def namespace = legacyNamespaces[subproject.name]
        if (namespace != null) {
            subproject.android.namespace = namespace
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.layout.buildDirectory
}

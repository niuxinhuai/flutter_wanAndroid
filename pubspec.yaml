name: flutter_wanandroid
description: A new Flutter project.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.41.9 <4.0.0"


dependencies:
  flutter:
    sdk: flutter


  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

    #网络
  dio: ^5.10.0

    #本地key-value缓存
  shared_preferences: ^2.5.5

    #文件路径操作
  path: ^1.8.0

  #通知
  event_bus: ^2.0.1

  video_player: ^2.11.1

      #下拉刷新
  pull_to_refresh:
    path: local_plugins/pull_to_refresh

    #json库
  json_annotation: ^4.12.0

    #图片缓存
  cached_network_image: ^3.4.1

    #图片浏览
  photo_view: ^0.15.0

  fish_redux:
    path: local_plugins/fish_redux

  encrypt: ^5.0.3

    #卡片切换
  card_swiper: ^3.0.1

  html_unescape: ^2.0.0

  #webview
  webview_flutter: ^4.13.1

  #拖动组件
  reorderables: ^0.6.0

  #左滑删除
  flutter_slidable: ^3.1.1

  #sqflite
  sqflite: ^2.4.2

  # 高德地图
  amap_flutter_map:
    path: local_plugins/amap_flutter_map
  amap_flutter_base:
    path: local_plugins/amap_flutter_base

  # 定位
  #amap_flutter_location: ^3.0.0

  intl: ^0.20.2

  one_context: ^4.1.0

#人脸识别
  local_auth: ^3.0.1

  flutter_boost:
    path: local_plugins/flutter_boost

dev_dependencies:
  flutter_test:
    sdk: flutter
  #自动生成代码
  source_gen: ^4.2.3

  #自动生成代码
  build_runner: ^2.9.0

  #json解析
  json_serializable: ^6.11.0

  flutter_lints: ^6.0.0


dependency_overrides:
  flutter_boost:
    path: local_plugins/flutter_boost

#  fish_redux:
#    git:
#      url: https://git.planoeye.cn/super-niu/flutter_packages.git
#      path: fish-redux


# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  fonts:
    #字体图标
    - family: iconfont
      fonts:
        - asset: assets/fonts/iconfont.ttf

  assets:
    - assets/images/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
